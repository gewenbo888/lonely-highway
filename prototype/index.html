<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lonely Highway — Shenzhen</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; cursor: none; }
canvas { display: block; }
#hud {
  position: fixed; bottom: 30px; right: 30px;
  color: #0ff; text-shadow: 0 0 10px #0ff, 0 0 20px #08f;
  font-size: 14px; z-index: 10; pointer-events: none; user-select: none;
}
#speedometer {
  width: 220px; padding: 15px 20px;
  background: rgba(0,0,0,0.7); border: 1px solid rgba(0,255,255,0.3);
  border-radius: 4px; backdrop-filter: blur(5px);
}
#speed-value { font-size: 52px; font-weight: bold; letter-spacing: 2px; }
#speed-unit { font-size: 14px; opacity: 0.7; margin-left: 4px; }
#gear-display { font-size: 22px; margin-top: 6px; color: #f80; text-shadow: 0 0 10px #f80; }
#rpm-bar-container {
  margin-top: 8px; height: 6px; background: rgba(255,255,255,0.1);
  border-radius: 3px; overflow: hidden;
}
#rpm-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #0f0, #ff0, #f00); border-radius: 3px; transition: width 0.05s; }
#title-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 20; pointer-events: none;
}
#game-title {
  font-size: 64px; font-weight: bold; color: #fff;
  text-shadow: 0 0 30px #f0a, 0 0 60px #f0a, 0 0 90px #80f;
  letter-spacing: 12px; opacity: 1; transition: opacity 3s;
  font-family: 'Courier New', monospace; text-transform: uppercase;
}
#subtitle {
  font-size: 16px; color: rgba(255,255,255,0.5); margin-top: 12px;
  letter-spacing: 6px; opacity: 1; transition: opacity 3s;
}
#controls-hint {
  position: fixed; bottom: 30px; left: 30px; color: rgba(255,255,255,0.3);
  font-size: 11px; z-index: 10; pointer-events: none; line-height: 1.8;
}
.fade-out { opacity: 0 !important; }

/* Touch controls */
#touch-controls {
  display: none;
  position: fixed; bottom: 0; left: 0; width: 100%; height: 100%;
  z-index: 15; pointer-events: none;
}
@media (pointer: coarse), (max-width: 900px) {
  #touch-controls { display: block; }
  #controls-hint { display: none; }
  body { cursor: auto; }
  #hud { top: 15px; bottom: auto; right: auto; left: 50%; transform: translateX(-50%); }
  #speedometer { width: 160px; padding: 8px 12px; }
  #speed-value { font-size: 36px; }
  #game-title { font-size: 32px; letter-spacing: 6px; }
  #subtitle { font-size: 12px; }
}

#touch-steer {
  position: absolute; bottom: 30px; left: 30px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  pointer-events: auto;
  touch-action: none;
}
#touch-steer-knob {
  position: absolute; top: 50%; left: 50%;
  width: 50px; height: 50px;
  margin: -25px 0 0 -25px;
  border-radius: 50%;
  background: rgba(0,255,255,0.25);
  border: 2px solid rgba(0,255,255,0.5);
  pointer-events: none;
  transition: transform 0.05s;
}

.touch-btn {
  position: absolute;
  width: 72px; height: 72px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; letter-spacing: 1px;
  color: rgba(255,255,255,0.7);
  pointer-events: auto;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
.touch-btn.active { transform: scale(0.9); }

#btn-gas {
  bottom: 80px; right: 30px;
  background: rgba(0,200,0,0.2); border: 2px solid rgba(0,200,0,0.4);
}
#btn-gas.active { background: rgba(0,200,0,0.5); }

#btn-brake {
  bottom: 80px; right: 120px;
  background: rgba(200,0,0,0.2); border: 2px solid rgba(200,0,0,0.4);
}
#btn-brake.active { background: rgba(200,0,0,0.5); }

#btn-handbrake {
  bottom: 170px; right: 75px;
  width: 64px; height: 64px;
  background: rgba(200,200,0,0.15); border: 2px solid rgba(200,200,0,0.3);
  font-size: 10px;
}
#btn-handbrake.active { background: rgba(200,200,0,0.4); }

#btn-camera {
  top: 30px; right: 30px;
  width: 50px; height: 50px;
  background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
  font-size: 10px;
}
</style>
</head>
<body>
<div id="title-overlay">
  <div id="game-title">Lonely Highway</div>
  <div id="subtitle">Shenzhen · 深圳</div>
</div>
<div id="hud">
  <div id="speedometer">
    <span id="speed-value">0</span><span id="speed-unit">km/h</span>
    <div id="gear-display">N</div>
    <div id="rpm-bar-container"><div id="rpm-bar"></div></div>
  </div>
</div>
<div id="controls-hint">
  WASD / Arrows — Drive<br>
  SPACE — Handbrake<br>
  C — Camera
</div>
<div id="touch-controls">
  <div id="touch-steer"><div id="touch-steer-knob"></div></div>
  <div id="btn-gas" class="touch-btn">GAS</div>
  <div id="btn-brake" class="touch-btn">BRAKE</div>
  <div id="btn-handbrake" class="touch-btn">HB</div>
  <div id="btn-camera" class="touch-btn">CAM</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── LONELY HIGHWAY ─── Shenzhen Night Driving ───

// Globals
let scene, camera, renderer, clock;
let car, carBody, carSpeed = 0, carAngle = 0;
let steerAngle = 0, throttle = 0, brakeForce = 0, handbrake = false;
let rpm = 800, gear = 1, engineLoad = 0;
let cameraMode = 0; // 0=chase, 1=hood
let rainParticles, streetLights = [], trafficLights = [];
let aiCars = [];
let audioCtx, engineOsc, engineGain, windGain, windNoise;
let headlightL, headlightR;
let keys = {};
let dayNightTime = 0.75; // start at night
let buildingMeshes = [];
let cityRoads = []; // loaded road data for AI traffic

// Physics
const maxSpeed = 55; // m/s (~200km/h)
const accelForce = 28;
const brakeDecel = 22;
const handbrakeDecel = 30;
const dragCoeff = 0.012;
const rollingResist = 0.15;
const steerSpeed = 2.5;
const maxSteer = 0.6;
const steerReturn = 4.0;

// Gear ratios
const gearRatios = [0, 3.6, 2.2, 1.5, 1.1, 0.85, 0.68];
const finalDrive = 3.5;
const maxRPM = 7500;
const idleRPM = 800;

// Start async
(async function main() {
  await init();
  animate();
})();

async function init() {
  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050510);
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.0025);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.8;
  document.body.appendChild(renderer.domElement);

  // Camera
  camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 1200);

  clock = new THREE.Clock();

  // Lighting
  const ambient = new THREE.AmbientLight(0x1a1a3a, 1.2);
  scene.add(ambient);

  const moonLight = new THREE.DirectionalLight(0x6688cc, 0.8);
  moonLight.position.set(100, 200, 50);
  scene.add(moonLight);

  // Ground plane — large enough for real data (~8km x 4km)
  createGround();

  // Load real city data
  const cityData = await fetch('city.json').then(r => r.json());
  createCityFromData(cityData);

  createCar();
  createRain();
  createAITraffic();
  initAudio();

  // Events
  window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
  window.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (e.code === 'KeyC') cycleCamera();
    e.preventDefault();
  });
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Touch Controls ──
  setupTouchControls();

  // Fade title
  setTimeout(() => {
    document.getElementById('game-title').classList.add('fade-out');
    document.getElementById('subtitle').classList.add('fade-out');
  }, 4000);
}

function createGround() {
  const groundGeo = new THREE.PlaneGeometry(10000, 10000);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x2a2a3e,
    roughness: 0.2,
    metalness: 0.5,
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.05;
  ground.receiveShadow = true;
  scene.add(ground);
}

function createCityFromData(data) {
  const roads = data.roads || [];
  const buildings = data.buildings || [];
  const signals = data.signals || [];

  cityRoads = roads; // store for AI traffic

  // ── Roads ──
  const roadMat = new THREE.MeshBasicMaterial({ color: 0x333344 });
  const dashMat = new THREE.MeshBasicMaterial({ color: 0xcccccc });

  for (const road of roads) {
    const pts = road.points;
    if (pts.length < 2) continue;
    const lanes = road.lanes || 2;
    const halfWidth = (lanes * 3.5) / 2;

    // Build road strip as a series of quads
    const vertices = [];
    const indices = [];

    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      const px = p[0], py = p[1] || 0, pz = p[2] || 0;

      // Direction vector for perpendicular
      let dx, dz;
      if (i < pts.length - 1) {
        dx = pts[i + 1][0] - px;
        dz = (pts[i + 1][2] || 0) - pz;
      } else {
        dx = px - pts[i - 1][0];
        dz = pz - (pts[i - 1][2] || 0);
      }
      const len = Math.sqrt(dx * dx + dz * dz) || 1;
      // Perpendicular (rotate 90 degrees)
      const nx = -dz / len;
      const nz = dx / len;

      const vi = vertices.length / 3;
      // Left edge
      vertices.push(px + nx * halfWidth, py + 0.02, pz + nz * halfWidth);
      // Right edge
      vertices.push(px - nx * halfWidth, py + 0.02, pz - nz * halfWidth);

      if (i < pts.length - 1) {
        const base = vi;
        indices.push(base, base + 2, base + 1);
        indices.push(base + 1, base + 2, base + 3);
      }
    }

    if (vertices.length >= 6) {
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      geo.setIndex(indices);
      geo.computeVertexNormals();
      const mesh = new THREE.Mesh(geo, roadMat);
      scene.add(mesh);
    }

    // Center dashed line
    let accDist = 0;
    for (let i = 0; i < pts.length - 1; i++) {
      const ax = pts[i][0], ay = pts[i][1] || 0, az = pts[i][2] || 0;
      const bx = pts[i + 1][0], by = pts[i + 1][1] || 0, bz = pts[i + 1][2] || 0;
      const segDx = bx - ax, segDz = bz - az;
      const segLen = Math.sqrt(segDx * segDx + segDz * segDz);
      if (segLen < 0.1) continue;
      const ux = segDx / segLen, uz = segDz / segLen;
      const angle = Math.atan2(ux, uz);

      let d = -accDist % 8; // 4m dash, 4m gap
      if (d < 0) d += 8;
      while (d < segLen) {
        if (d >= 0) {
          const dashLen = Math.min(3, segLen - d);
          if (dashLen > 0.5) {
            const cx = ax + ux * (d + dashLen / 2);
            const cy = ((ay + by) / 2) + 0.04;
            const cz = az + uz * (d + dashLen / 2);
            const dashGeo = new THREE.PlaneGeometry(0.2, dashLen);
            const dash = new THREE.Mesh(dashGeo, dashMat);
            dash.rotation.x = -Math.PI / 2;
            dash.rotation.z = -angle;
            dash.position.set(cx, cy, cz);
            scene.add(dash);
          }
        }
        d += 8;
      }
      accDist += segLen;
    }
  }

  // ── Buildings ──
  const neonColors = [0xff0066, 0x00ffff, 0xff6600, 0x00ff66, 0xff00ff, 0x6666ff, 0xffff00, 0x00aaff];

  for (const bld of buildings) {
    const fp = bld.footprint;
    if (!fp || fp.length < 3) continue;
    const height = bld.height || 10;
    const btype = bld.type || 'Other';

    // Choose building color by type
    let wallColor, windowChance;
    if (btype === 'Commercial') {
      wallColor = new THREE.Color().setHSL(0.6, 0.08, 0.12 + Math.random() * 0.04);
      windowChance = 0.6;
    } else if (btype === 'Residential') {
      wallColor = new THREE.Color().setHSL(0.08 + Math.random() * 0.05, 0.15, 0.08 + Math.random() * 0.04);
      windowChance = 0.35;
    } else if (btype === 'Industrial') {
      wallColor = new THREE.Color().setHSL(0, 0, 0.05 + Math.random() * 0.03);
      windowChance = 0.15;
    } else {
      wallColor = new THREE.Color().setHSL(Math.random(), 0.05, 0.05 + Math.random() * 0.04);
      windowChance = 0.2;
    }

    // Create extruded building from footprint
    const shape = new THREE.Shape();
    shape.moveTo(fp[0][0], fp[0][1]);
    for (let i = 1; i < fp.length; i++) {
      shape.lineTo(fp[i][0], fp[i][1]);
    }
    shape.closePath();

    const extrudeSettings = { depth: height, bevelEnabled: false };
    const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);

    const mat = new THREE.MeshStandardMaterial({
      color: wallColor,
      roughness: 0.8,
      metalness: 0.3,
    });
    const mesh = new THREE.Mesh(geo, mat);
    // ExtrudeGeometry extrudes along Z in shape space; we need to rotate so it goes up (Y)
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.y = 0;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    buildingMeshes.push(mesh);

    // Compute building center and approximate width for windows and neon
    let cx = 0, cz = 0;
    let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
    for (const p of fp) {
      cx += p[0]; cz += p[1];
      minX = Math.min(minX, p[0]); maxX = Math.max(maxX, p[0]);
      minZ = Math.min(minZ, p[1]); maxZ = Math.max(maxZ, p[1]);
    }
    cx /= fp.length; cz /= fp.length;
    const bWidth = maxX - minX;
    const bDepth = maxZ - minZ;

    // Windows on major faces (front and back for simplicity)
    if (height > 6) {
      const windowRows = Math.floor(height / 4);
      const windowCols = Math.max(1, Math.floor(bWidth / 3));
      for (let wy = 0; wy < windowRows; wy++) {
        for (let wx = 0; wx < windowCols; wx++) {
          if (Math.random() > windowChance) continue;
          const lit = Math.random() > 0.3;
          let wColor;
          if (btype === 'Commercial') {
            wColor = lit
              ? new THREE.Color().setHSL(0.55 + Math.random() * 0.1, 0.4, 0.6 + Math.random() * 0.3)
              : new THREE.Color(0x111111);
          } else if (btype === 'Residential') {
            wColor = lit
              ? new THREE.Color().setHSL(0.1 + Math.random() * 0.1, 0.3, 0.5 + Math.random() * 0.3)
              : new THREE.Color(0x111111);
          } else {
            wColor = lit
              ? new THREE.Color().setHSL(0.15, 0.2, 0.3 + Math.random() * 0.2)
              : new THREE.Color(0x111111);
          }
          const winGeo = new THREE.PlaneGeometry(1.5, 2);
          const winMat = new THREE.MeshBasicMaterial({ color: wColor });

          // Front face (max Z side)
          const win = new THREE.Mesh(winGeo, winMat);
          win.position.set(
            minX + 2 + wx * 3,
            3 + wy * 4,
            maxZ + 0.05
          );
          scene.add(win);

          // Back face (min Z side)
          const win2 = new THREE.Mesh(winGeo, winMat);
          win2.position.set(
            minX + 2 + wx * 3,
            3 + wy * 4,
            minZ - 0.05
          );
          win2.rotation.y = Math.PI;
          scene.add(win2);
        }
      }
    }

    // Neon signs on some tall buildings
    if (Math.random() > 0.65 && height > 25) {
      const neonColor = neonColors[Math.floor(Math.random() * neonColors.length)];
      const neonW = 3 + Math.random() * 6;
      const neonH = 1.5 + Math.random() * 2.5;
      const neonY = 8 + Math.random() * Math.min(height * 0.4, 30);
      const face = Math.floor(Math.random() * 4);

      const neonGeo = new THREE.PlaneGeometry(neonW, neonH);
      const neonMat = new THREE.MeshBasicMaterial({ color: neonColor });
      const neon = new THREE.Mesh(neonGeo, neonMat);

      if (face === 0) { neon.position.set(cx, neonY, maxZ + 0.15); }
      else if (face === 1) { neon.position.set(cx, neonY, minZ - 0.15); neon.rotation.y = Math.PI; }
      else if (face === 2) { neon.position.set(maxX + 0.15, neonY, cz); neon.rotation.y = Math.PI / 2; }
      else { neon.position.set(minX - 0.15, neonY, cz); neon.rotation.y = -Math.PI / 2; }
      scene.add(neon);

      const neonLight = new THREE.PointLight(neonColor, 2, 25);
      neonLight.position.copy(neon.position);
      scene.add(neonLight);
    }

    // Rooftop beacon on tall buildings
    if (height > 50) {
      const roofLight = new THREE.PointLight(0xff0000, 1, 30);
      roofLight.position.set(cx, height + 1, cz);
      scene.add(roofLight);
      const beacon = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xff0000 })
      );
      beacon.position.copy(roofLight.position);
      scene.add(beacon);
    }
  }

  // ── Traffic signals ──
  for (const sig of signals) {
    createTrafficLight(sig.x, sig.z, sig.cycle || 60);
  }

  // ── Street lights along major roads ──
  const majorClasses = new Set(['Primary', 'Secondary', 'Trunk', 'PrimaryLink', 'TrunkLink']);
  for (const road of roads) {
    if (!majorClasses.has(road.class)) continue;
    const pts = road.points;
    if (pts.length < 2) continue;
    const lanes = road.lanes || 2;
    const halfWidth = (lanes * 3.5) / 2;

    let accDist = 0;
    for (let i = 0; i < pts.length - 1; i++) {
      const ax = pts[i][0], ay = pts[i][1] || 0, az = pts[i][2] || 0;
      const bx = pts[i + 1][0], by = pts[i + 1][1] || 0, bz = pts[i + 1][2] || 0;
      const segDx = bx - ax, segDz = bz - az;
      const segLen = Math.sqrt(segDx * segDx + segDz * segDz);
      if (segLen < 1) { accDist += segLen; continue; }
      const ux = segDx / segLen, uz = segDz / segLen;
      // Perpendicular
      const nx = -uz, nz = ux;

      let d = 40 - (accDist % 40);
      while (d < segLen) {
        const lx = ax + ux * d;
        const lz = az + uz * d;
        const ly = ay + (by - ay) * (d / segLen);
        // Place on one side
        const side = (Math.floor((accDist + d) / 40) % 2 === 0) ? 1 : -1;
        createStreetLight(lx + nx * (halfWidth + 2) * side, lz + nz * (halfWidth + 2) * side, ly);
        d += 40;
      }
      accDist += segLen;
    }
  }
}

function createStreetLight(x, z, baseY) {
  const y = baseY || 0;
  // Pole
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1, 0.15, 8, 6),
    new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.3 })
  );
  pole.position.set(x, y + 4, z);
  scene.add(pole);

  // Lamp
  const lamp = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffcc66 })
  );
  lamp.position.set(x, y + 8, z);
  scene.add(lamp);

  // Light
  const light = new THREE.PointLight(0xffcc66, 3, 50, 1.5);
  light.position.set(x, y + 7.8, z);
  scene.add(light);
  streetLights.push(light);
}

function createTrafficLight(x, z, cycle) {
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 5, 6),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );
  pole.position.set(x, 2.5, z);
  scene.add(pole);

  const box = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 1.5, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x111111 })
  );
  box.position.set(x, 5.5, z);
  scene.add(box);

  // Red, Yellow, Green lights
  const colors = [0xff0000, 0xffaa00, 0x00ff00];
  const lights = [];
  for (let i = 0; i < 3; i++) {
    const bulb = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0x111111 })
    );
    bulb.position.set(x, 6.0 - i * 0.45, z + 0.3);
    scene.add(bulb);
    lights.push({ mesh: bulb, color: colors[i] });
  }

  trafficLights.push({
    lights: lights,
    phase: Math.random() * cycle,
    cycle: cycle,
    x: x, z: z
  });
}

function createCar() {
  car = new THREE.Group();

  // Car body — use MeshBasicMaterial so it's always visible regardless of lighting
  const bodyMat = new THREE.MeshBasicMaterial({ color: 0x3366cc });

  // Main body (lower)
  const mainBody = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4.5), bodyMat);
  mainBody.position.y = 0.6;
  car.add(mainBody);

  // Hood/trunk accent
  const accentMat = new THREE.MeshBasicMaterial({ color: 0x2255aa });
  const hood = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.1, 1.8), accentMat);
  hood.position.set(0, 1.01, 1.2);
  car.add(hood);
  const trunk = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.1, 1.2), accentMat);
  trunk.position.set(0, 1.01, -1.5);
  car.add(trunk);

  // Cabin (windshield glow)
  const cabinMat = new THREE.MeshBasicMaterial({
    color: 0x99bbdd, transparent: true, opacity: 0.4
  });
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.7, 2.2), cabinMat);
  cabin.position.set(0, 1.25, -0.2);
  car.add(cabin);

  // Wheels
  const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 12);
  const wheelMat = new THREE.MeshBasicMaterial({ color: 0x444444 });
  const wheelPositions = [[-0.9, 0.35, 1.4], [0.9, 0.35, 1.4], [-0.9, 0.35, -1.4], [0.9, 0.35, -1.4]];
  wheelPositions.forEach(pos => {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(...pos);
    car.add(wheel);
  });

  // Tail lights
  const tailLightMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  const tlGeo = new THREE.BoxGeometry(0.3, 0.15, 0.05);
  const tl1 = new THREE.Mesh(tlGeo, tailLightMat);
  tl1.position.set(-0.7, 0.7, -2.26);
  car.add(tl1);
  const tl2 = new THREE.Mesh(tlGeo, tailLightMat);
  tl2.position.set(0.7, 0.7, -2.26);
  car.add(tl2);

  // Tail light glow
  const tailGlow = new THREE.PointLight(0xff0000, 0.5, 8);
  tailGlow.position.set(0, 0.7, -2.5);
  car.add(tailGlow);

  // Headlights
  const hlGeo = new THREE.BoxGeometry(0.3, 0.15, 0.05);
  const hlMat = new THREE.MeshBasicMaterial({ color: 0xffffee });
  const hl1 = new THREE.Mesh(hlGeo, hlMat);
  hl1.position.set(-0.7, 0.7, 2.26);
  car.add(hl1);
  const hl2 = new THREE.Mesh(hlGeo, hlMat);
  hl2.position.set(0.7, 0.7, 2.26);
  car.add(hl2);

  // Spotlight headlights
  headlightL = new THREE.SpotLight(0xffeedd, 5, 200, Math.PI / 5, 0.4, 1.2);
  headlightL.position.set(-0.7, 0.7, 2.3);
  headlightL.target.position.set(-1, -0.5, 30);
  car.add(headlightL);
  car.add(headlightL.target);

  headlightR = new THREE.SpotLight(0xffeedd, 5, 200, Math.PI / 5, 0.4, 1.2);
  headlightR.position.set(0.7, 0.7, 2.3);
  headlightR.target.position.set(1, -0.5, 30);
  car.add(headlightR);
  car.add(headlightR.target);

  // Strong fill light so car and nearby road are visible
  const carFill = new THREE.PointLight(0xaaccff, 4, 25);
  carFill.position.set(0, 3, 0);
  car.add(carFill);

  // Start at data center
  car.position.set(0, 0, 0);
  scene.add(car);
  carBody = mainBody;
}

function createRain() {
  const rainCount = 8000;
  const rainGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(rainCount * 3);
  const velocities = new Float32Array(rainCount);

  for (let i = 0; i < rainCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 200;
    positions[i * 3 + 1] = Math.random() * 100;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 200;
    velocities[i] = 0.5 + Math.random() * 0.5;
  }

  rainGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const rainMat = new THREE.PointsMaterial({
    color: 0x8888cc,
    size: 0.15,
    transparent: true,
    opacity: 0.4,
  });

  rainParticles = new THREE.Points(rainGeo, rainMat);
  rainParticles.userData.velocities = velocities;
  scene.add(rainParticles);
}

function createAITraffic() {
  // Pick roads suitable for AI traffic (longer roads with enough points)
  const aiColors = [0xcc2222, 0x2222cc, 0xcccc22, 0x22cc22, 0xffffff, 0x666666, 0xcc6600];
  const drivableRoads = cityRoads.filter(r => {
    if (r.points.length < 2) return false;
    // Compute road length
    let len = 0;
    for (let i = 0; i < r.points.length - 1; i++) {
      const dx = r.points[i + 1][0] - r.points[i][0];
      const dz = (r.points[i + 1][2] || 0) - (r.points[i][2] || 0);
      len += Math.sqrt(dx * dx + dz * dz);
    }
    r._length = len;
    return len > 50;
  });

  if (drivableRoads.length === 0) return;

  for (let i = 0; i < 30; i++) {
    const road = drivableRoads[Math.floor(Math.random() * drivableRoads.length)];
    const direction = Math.random() > 0.5 ? 1 : -1;
    const lanes = road.lanes || 2;
    const halfWidth = (lanes * 3.5) / 2;
    // Lane offset from center line
    const laneOffset = (Math.random() * 0.4 + 0.2) * halfWidth * (Math.random() > 0.5 ? 1 : -1);

    const aiGroup = new THREE.Group();
    const color = aiColors[Math.floor(Math.random() * aiColors.length)];

    const body = new THREE.Mesh(
      new THREE.BoxGeometry(1.8, 0.7, 4),
      new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.7 })
    );
    body.position.y = 0.55;
    aiGroup.add(body);

    const cabinAI = new THREE.Mesh(
      new THREE.BoxGeometry(1.6, 0.5, 1.8),
      new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.1, metalness: 0.8, transparent: true, opacity: 0.5 })
    );
    cabinAI.position.set(0, 1.1, -0.2);
    aiGroup.add(cabinAI);

    // AI headlights
    const aiHL = new THREE.PointLight(0xffffcc, 0.5, 15);
    aiHL.position.set(0, 0.6, 2.1);
    aiGroup.add(aiHL);

    // AI taillights
    const aiTL = new THREE.PointLight(0xff0000, 0.3, 8);
    aiTL.position.set(0, 0.6, -2.1);
    aiGroup.add(aiTL);

    const speed = 5 + Math.random() * 12;
    // Start at a random point along the road
    const startT = Math.random();

    scene.add(aiGroup);
    aiCars.push({
      mesh: aiGroup,
      speed: speed,
      direction: direction,
      road: road,
      t: startT, // parametric position along road (0..1 mapped to distance)
      laneOffset: laneOffset
    });

    // Set initial position
    updateAIPosition(aiCars[aiCars.length - 1]);
  }
}

function getRoadPointAtDistance(road, dist) {
  // Walk along segments to find position at given distance
  const pts = road.points;
  let remaining = dist;
  for (let i = 0; i < pts.length - 1; i++) {
    const ax = pts[i][0], ay = pts[i][1] || 0, az = pts[i][2] || 0;
    const bx = pts[i + 1][0], by = pts[i + 1][1] || 0, bz = pts[i + 1][2] || 0;
    const dx = bx - ax, dy = by - ay, dz = bz - az;
    const segLen = Math.sqrt(dx * dx + dz * dz);
    if (segLen < 0.01) continue;

    if (remaining <= segLen) {
      const frac = remaining / segLen;
      const px = ax + dx * frac;
      const py = ay + dy * frac;
      const pz = az + dz * frac;
      // Direction
      const angle = Math.atan2(dx, dz);
      // Perpendicular for lane offset
      const nx = -dz / segLen, nz = dx / segLen;
      return { x: px, y: py, z: pz, angle: angle, nx: nx, nz: nz };
    }
    remaining -= segLen;
  }
  // Past end — return last point
  const last = pts[pts.length - 1];
  const prev = pts[pts.length - 2] || pts[pts.length - 1];
  const dx = last[0] - prev[0], dz = (last[2] || 0) - (prev[2] || 0);
  const segLen = Math.sqrt(dx * dx + dz * dz) || 1;
  return {
    x: last[0], y: last[1] || 0, z: last[2] || 0,
    angle: Math.atan2(dx, dz),
    nx: -dz / segLen, nz: dx / segLen
  };
}

function updateAIPosition(ai) {
  const road = ai.road;
  const totalLen = road._length;
  let dist = ai.t * totalLen;
  if (ai.direction < 0) dist = totalLen - dist;
  const pos = getRoadPointAtDistance(road, dist);
  ai.mesh.position.set(
    pos.x + pos.nx * ai.laneOffset,
    pos.y,
    pos.z + pos.nz * ai.laneOffset
  );
  ai.mesh.rotation.y = pos.angle + (ai.direction < 0 ? Math.PI : 0);
}

function initAudio() {
  const startAudio = () => {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Engine sound — layered oscillators
    engineOsc = audioCtx.createOscillator();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 55;

    const engineOsc2 = audioCtx.createOscillator();
    engineOsc2.type = 'square';
    engineOsc2.frequency.value = 110;

    engineGain = audioCtx.createGain();
    engineGain.gain.value = 0.06;

    const engineGain2 = audioCtx.createGain();
    engineGain2.gain.value = 0.02;

    const engineFilter = audioCtx.createBiquadFilter();
    engineFilter.type = 'lowpass';
    engineFilter.frequency.value = 400;
    engineFilter.Q.value = 2;

    engineOsc.connect(engineFilter);
    engineOsc2.connect(engineFilter);
    engineFilter.connect(engineGain);
    engineFilter.connect(engineGain2);
    engineGain.connect(audioCtx.destination);
    engineGain2.connect(audioCtx.destination);
    engineOsc.start();
    engineOsc2.start();

    // Store filter reference for modulation
    engineOsc.userData = { filter: engineFilter, osc2: engineOsc2 };

    // Wind/rain noise
    const bufferSize = 2 * audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

    windNoise = audioCtx.createBufferSource();
    windNoise.buffer = noiseBuffer;
    windNoise.loop = true;

    const windFilter = audioCtx.createBiquadFilter();
    windFilter.type = 'bandpass';
    windFilter.frequency.value = 800;
    windFilter.Q.value = 0.5;

    windGain = audioCtx.createGain();
    windGain.gain.value = 0.01;

    windNoise.connect(windFilter);
    windFilter.connect(windGain);
    windGain.connect(audioCtx.destination);
    windNoise.start();
  };

  document.addEventListener('keydown', startAudio, { once: false });
  document.addEventListener('click', startAudio, { once: true });
}

function updateAudio(dt) {
  if (!audioCtx || !engineOsc) return;

  // Engine frequency from RPM
  const baseFreq = 30 + (rpm / maxRPM) * 120;
  engineOsc.frequency.setTargetAtTime(baseFreq, audioCtx.currentTime, 0.02);
  if (engineOsc.userData && engineOsc.userData.osc2) {
    engineOsc.userData.osc2.frequency.setTargetAtTime(baseFreq * 2, audioCtx.currentTime, 0.02);
  }

  // Engine volume based on throttle and RPM
  const vol = 0.03 + throttle * 0.06 + (rpm / maxRPM) * 0.04;
  engineGain.gain.setTargetAtTime(Math.min(vol, 0.15), audioCtx.currentTime, 0.05);

  // Filter cutoff responds to RPM
  if (engineOsc.userData && engineOsc.userData.filter) {
    const cutoff = 200 + (rpm / maxRPM) * 600 + throttle * 400;
    engineOsc.userData.filter.frequency.setTargetAtTime(cutoff, audioCtx.currentTime, 0.02);
  }

  // Wind based on speed
  if (windGain) {
    const windVol = Math.abs(carSpeed) / maxSpeed * 0.04;
    windGain.gain.setTargetAtTime(windVol, audioCtx.currentTime, 0.1);
  }
}

function updateCarPhysics(dt) {
  // Input
  throttle = 0;
  brakeForce = 0;

  if (keys['KeyW'] || keys['ArrowUp'] || touchGas) throttle = 1;
  if (keys['KeyS'] || keys['ArrowDown'] || touchBrake) brakeForce = 1;
  if (keys['Space'] || touchHandbrake) handbrake = true; else handbrake = false;

  // Steering — keyboard or touch joystick
  let targetSteer = ((keys['KeyA'] || keys['ArrowLeft']) ? 1 : 0) - ((keys['KeyD'] || keys['ArrowRight']) ? 1 : 0);
  if (targetSteer === 0 && Math.abs(touchSteerX) > 0.05) targetSteer = touchSteerX;
  if (targetSteer !== 0) {
    steerAngle += targetSteer * steerSpeed * dt;
    steerAngle = Math.max(-maxSteer, Math.min(maxSteer, steerAngle));
  } else {
    // Return to center
    if (Math.abs(steerAngle) < 0.02) steerAngle = 0;
    else steerAngle -= Math.sign(steerAngle) * steerReturn * dt;
  }

  // Speed-dependent steering reduction
  const steerFactor = 1 - Math.abs(carSpeed) / maxSpeed * 0.6;
  const effectiveSteer = steerAngle * steerFactor;

  // Acceleration
  let force = 0;
  if (throttle > 0 && !handbrake) {
    force = accelForce * throttle;
  }

  // Braking
  if (brakeForce > 0) {
    if (carSpeed > 0.5) {
      force -= brakeDecel * brakeForce;
    } else if (carSpeed < -0.5) {
      force += brakeDecel * brakeForce;
    } else {
      // Reverse
      force = -accelForce * 0.4 * brakeForce;
    }
  }

  // Handbrake
  if (handbrake && Math.abs(carSpeed) > 0.5) {
    force -= Math.sign(carSpeed) * handbrakeDecel;
  }

  // Drag and rolling resistance
  force -= dragCoeff * carSpeed * Math.abs(carSpeed);
  force -= rollingResist * carSpeed;

  // Apply force
  carSpeed += force * dt;
  carSpeed = Math.max(-maxSpeed * 0.3, Math.min(maxSpeed, carSpeed));

  // Very low speed deadzone
  if (Math.abs(carSpeed) < 0.1 && throttle === 0 && brakeForce === 0) carSpeed = 0;

  // Turning
  if (Math.abs(carSpeed) > 0.3) {
    const turnRate = effectiveSteer * (carSpeed / 15);
    carAngle += turnRate * dt;
  }

  // Handbrake drift effect
  if (handbrake && Math.abs(carSpeed) > 5) {
    carAngle += effectiveSteer * 1.5 * dt * Math.sign(carSpeed);
  }

  // Update position
  const dx = Math.sin(carAngle) * carSpeed * dt;
  const dz = Math.cos(carAngle) * carSpeed * dt;
  car.position.x += dx;
  car.position.z += dz;
  car.rotation.y = carAngle;

  // Body roll
  const roll = -effectiveSteer * Math.abs(carSpeed) / maxSpeed * 0.04;
  const pitch = -force * 0.002;
  if (carBody) {
    carBody.rotation.z += (roll - carBody.rotation.z) * 5 * dt;
    carBody.rotation.x += (pitch - carBody.rotation.x) * 3 * dt;
  }

  // RPM and gear simulation
  const absSpeed = Math.abs(carSpeed);
  const speedKmh = absSpeed * 3.6;

  // Auto shift
  const wheelRPM = absSpeed * 60 / (2 * Math.PI * 0.35);
  if (gear > 0) {
    rpm = wheelRPM * gearRatios[gear] * finalDrive + idleRPM;
  } else {
    rpm = idleRPM + throttle * 2000;
  }

  if (absSpeed < 0.5) {
    gear = throttle > 0 ? 1 : 0;
    rpm = idleRPM + throttle * 2500;
  } else {
    // Upshift
    if (rpm > maxRPM * 0.9 && gear < 6) gear++;
    // Downshift
    if (rpm < idleRPM * 1.5 && gear > 1) gear--;
  }

  rpm = Math.max(idleRPM, Math.min(maxRPM, rpm));

  // Update HUD
  document.getElementById('speed-value').textContent = Math.abs(Math.round(speedKmh));
  document.getElementById('gear-display').textContent = gear === 0 ? 'N' : (carSpeed < -0.5 ? 'R' : 'D' + gear);
  document.getElementById('rpm-bar').style.width = ((rpm - idleRPM) / (maxRPM - idleRPM) * 100) + '%';
}

function updateCamera(dt) {
  if (cameraMode === 0) {
    // Chase cam
    const chaseDist = 10;
    const chaseHeight = 4;
    const targetX = car.position.x - Math.sin(carAngle) * chaseDist;
    const targetZ = car.position.z - Math.cos(carAngle) * chaseDist;
    const targetY = chaseHeight;

    camera.position.x += (targetX - camera.position.x) * 3 * dt;
    camera.position.y += (targetY - camera.position.y) * 3 * dt;
    camera.position.z += (targetZ - camera.position.z) * 3 * dt;

    const lookTarget = new THREE.Vector3(
      car.position.x + Math.sin(carAngle) * 10,
      1.5,
      car.position.z + Math.cos(carAngle) * 10
    );
    camera.lookAt(lookTarget);
  } else {
    // Hood cam
    const hoodX = car.position.x + Math.sin(carAngle) * 1.2;
    const hoodZ = car.position.z + Math.cos(carAngle) * 1.2;
    camera.position.set(hoodX, 1.5, hoodZ);
    const lookFar = new THREE.Vector3(
      car.position.x + Math.sin(carAngle) * 50,
      1.2,
      car.position.z + Math.cos(carAngle) * 50
    );
    camera.lookAt(lookFar);
  }
}

// Touch input state
let touchSteerX = 0; // -1 to 1
let touchGas = false;
let touchBrake = false;
let touchHandbrake = false;

function setupTouchControls() {
  const steerPad = document.getElementById('touch-steer');
  const knob = document.getElementById('touch-steer-knob');
  const btnGas = document.getElementById('btn-gas');
  const btnBrake = document.getElementById('btn-brake');
  const btnHB = document.getElementById('btn-handbrake');
  const btnCam = document.getElementById('btn-camera');

  if (!steerPad) return;

  // ── Joystick steering ──
  let steerTouch = null;
  const steerRadius = 45; // max knob travel in px

  steerPad.addEventListener('touchstart', e => {
    e.preventDefault();
    steerTouch = e.changedTouches[0].identifier;
    handleSteerMove(e.changedTouches[0]);
    // Activate audio on first touch
    if (typeof startAudio === 'function') startAudio();
  }, { passive: false });

  steerPad.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === steerTouch) handleSteerMove(t);
    }
  }, { passive: false });

  steerPad.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === steerTouch) {
        steerTouch = null;
        touchSteerX = 0;
        knob.style.transform = 'translate(0px, 0px)';
      }
    }
  });
  steerPad.addEventListener('touchcancel', e => {
    steerTouch = null;
    touchSteerX = 0;
    knob.style.transform = 'translate(0px, 0px)';
  });

  function handleSteerMove(touch) {
    const rect = steerPad.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = touch.clientX - cx;
    let dy = touch.clientY - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > steerRadius) {
      dx = dx / dist * steerRadius;
      dy = dy / dist * steerRadius;
    }
    touchSteerX = -(dx / steerRadius); // negative because left = positive steer
    knob.style.transform = `translate(${dx}px, ${dy}px)`;
  }

  // ── Gas button ──
  function btnDown(el, setter) {
    el.addEventListener('touchstart', e => {
      e.preventDefault();
      setter(true);
      el.classList.add('active');
      if (typeof startAudio === 'function') startAudio();
    }, { passive: false });
    el.addEventListener('touchend', e => { setter(false); el.classList.remove('active'); });
    el.addEventListener('touchcancel', e => { setter(false); el.classList.remove('active'); });
  }

  btnDown(btnGas, v => { touchGas = v; });
  btnDown(btnBrake, v => { touchBrake = v; });
  btnDown(btnHB, v => { touchHandbrake = v; });

  // ── Camera button ──
  btnCam.addEventListener('touchstart', e => {
    e.preventDefault();
    cycleCamera();
  }, { passive: false });
}

function cycleCamera() {
  cameraMode = (cameraMode + 1) % 2;
}

function updateRain(dt) {
  if (!rainParticles) return;
  const positions = rainParticles.geometry.attributes.position.array;
  const vels = rainParticles.userData.velocities;

  for (let i = 0; i < vels.length; i++) {
    positions[i * 3 + 1] -= vels[i] * 60 * dt;

    if (positions[i * 3 + 1] < 0) {
      positions[i * 3 + 1] = 80 + Math.random() * 20;
      positions[i * 3] = (Math.random() - 0.5) * 200;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 200;
    }
  }

  // Move rain with camera
  rainParticles.position.x = car.position.x;
  rainParticles.position.z = car.position.z;

  rainParticles.geometry.attributes.position.needsUpdate = true;
}

function updateAITraffic(dt) {
  for (const ai of aiCars) {
    const road = ai.road;
    const totalLen = road._length;
    if (totalLen < 1) continue;

    // Advance parametric position
    ai.t += (ai.speed * dt) / totalLen;

    // Wrap around
    if (ai.t > 1) ai.t -= 1;
    if (ai.t < 0) ai.t += 1;

    updateAIPosition(ai);
  }
}

function updateTrafficLights(time) {
  for (const tl of trafficLights) {
    const cycle = tl.cycle || 60;
    const t = (time + tl.phase) % cycle;
    const greenTime = cycle * 0.5;
    const yellowTime = cycle * 0.1;
    let activeIdx;
    if (t < greenTime) activeIdx = 2; // Green
    else if (t < greenTime + yellowTime) activeIdx = 1; // Yellow
    else activeIdx = 0; // Red

    for (let i = 0; i < 3; i++) {
      if (i === activeIdx) {
        tl.lights[i].mesh.material.color.setHex(tl.lights[i].color);
      } else {
        tl.lights[i].mesh.material.color.setHex(0x111111);
      }
    }
  }
}

function updateDayNight(dt) {
  dayNightTime += dt * 0.002; // Very slow cycle
  if (dayNightTime > 1) dayNightTime -= 1;

  // Night is 0.65-1.0 and 0.0-0.15
  const nightFactor = dayNightTime > 0.5
    ? Math.min(1, (dayNightTime - 0.5) * 4)
    : Math.max(0, 1 - dayNightTime * 4);

  const fogDensity = 0.0015 + nightFactor * 0.0015;
  scene.fog.density = fogDensity;

  const bgIntensity = 0.05 + (1 - nightFactor) * 0.15;
  scene.background.setRGB(bgIntensity * 0.3, bgIntensity * 0.3, bgIntensity * 0.6);

  renderer.toneMappingExposure = 0.4 + (1 - nightFactor) * 0.8;
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.elapsedTime;

  updateCarPhysics(dt);
  updateCamera(dt);
  updateRain(dt);
  updateAITraffic(dt);
  updateTrafficLights(time);
  updateDayNight(dt);
  updateAudio(dt);

  renderer.render(scene, camera);
}
